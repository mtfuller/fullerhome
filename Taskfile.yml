version: '3'

vars:
  BINARY_NAME: server
  BUILD_DIR: bin
  MAIN_PATH: ./cmd/server
  COVERAGE_FILE: coverage.out
  COVERAGE_HTML: coverage.html

tasks:
  default:
    desc: Display available tasks
    cmds:
      - task --list
    silent: true

  gen:
    desc: Generate Go code from Templ source files
    cmds:
      - templ generate ./templates/...

  build:
    desc: Build the server binary
    deps: [gen]
    cmds:
      - go build -o {{.BUILD_DIR}}/{{.BINARY_NAME}} {{.MAIN_PATH}}

  build-ui:
    desc: Build the React canvas bundle into static/
    dir: web
    cmds:
      - npm run build

  run:
    desc: Run the server locally (requires gen + build-ui to have been run)
    cmds:
      - go run {{.MAIN_PATH}}/main.go

  dev:
    desc: Run server and Vite dev server concurrently
    deps: [gen]
    cmds:
      - |
        (cd web && npm run dev) &
        go run {{.MAIN_PATH}}/main.go

  test:
    desc: Run all tests
    deps: [test-unit, test-integration]

  test-unit:
    desc: Run unit tests with race detector and coverage
    cmds:
      - go test -v -race -coverprofile={{.COVERAGE_FILE}} ./tests/unit/...

  test-integration:
    desc: Run integration tests
    cmds:
      - go test -v -race ./tests/integration/...

  coverage:
    desc: Generate HTML coverage report
    deps: [test-unit]
    cmds:
      - go tool cover -html={{.COVERAGE_FILE}} -o {{.COVERAGE_HTML}}
      - echo "Coverage report{{":"}} {{.COVERAGE_HTML}}"

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf {{.BUILD_DIR}}/
      - rm -f {{.COVERAGE_FILE}} {{.COVERAGE_HTML}}
      - rm -rf static/
      - rm -f fullerhome.db

  lint:
    desc: Run linter
    preconditions:
      - sh: command -v golangci-lint
        msg: "golangci-lint not installed: https://golangci-lint.run/usage/install/"
    cmds:
      - golangci-lint run ./...

  deps:
    desc: Install/tidy all dependencies
    cmds:
      - go mod download
      - go mod tidy
      - cd web && npm install
