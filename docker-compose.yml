version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: starterpack-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: starterpack
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: starterpack-api
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: "8080"
      SERVER_MODE: "development"
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: starterpack
      DB_SSLMODE: disable
      LOG_LEVEL: "info"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
